name: Build EDF_Oeste APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Create Android project
        run: |
          rm -rf android
          npx cap add android

      - name: Generate Android icon from assets/icon.png
        run: |
          npx capacitor-assets generate --android --iconBackgroundColor '#FFFFFF' --iconBackgroundColorDark '#FFFFFF' --splashBackgroundColor '#17B5A4' --splashBackgroundColorDark '#17B5A4'

      - name: Sync Android
        run: npx cap sync android

      - name: Verify icons
        run: |
          find android/app/src/main/res -name 'ic_launcher*' -type f -print
          grep -n "android:icon" android/app/src/main/AndroidManifest.xml || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EDF_Oeste_APK
          path: android/app/build/outputs/apk/debug/*.apk
