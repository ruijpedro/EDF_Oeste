name: Build EDF_Oeste APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Recreate Android project
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Apply EDF_Oeste icon
        run: node scripts/prepare-android-icons.js

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EDF_Oeste_APK
          path: android/app/build/outputs/apk/debug/*.apk
